<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyComp — M+ Composition Analyzer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <h1 class="logo">⚔ KeyComp</h1>
      <p class="tagline">Mythic+ Composition Analyzer</p>
    </header>

    <main>
      <section class="card form-card">
        <h2>Your Party</h2>
        <p class="hint">Enter up to 5 characters. Use the Raider.io profile name exactly.</p>

        <div id="character-rows"></div>

        <div class="form-actions">
          <button id="add-btn" class="btn btn-secondary" type="button">+ Add Character</button>
          <button id="analyze-btn" class="btn btn-primary" type="button">Analyze Party</button>
        </div>
      </section>

      <section id="results" class="hidden">
        <div id="character-cards" class="character-grid"></div>
        <div class="card analysis-card">
          <h2>Analysis</h2>
          <div id="analysis-text" class="analysis-body"></div>
        </div>
      </section>

      <div id="error-banner" class="error-banner hidden"></div>
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <span>Fetching characters and running analysis…</span>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
